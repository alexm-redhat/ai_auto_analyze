---
issue_id: "crio-post-stop-hooks-9613"

bug_description: >
  Fix race condition in post-stop hook ordering. ContainerStateToDisk calls
  UpdateContainerStatus which updates the container state to stopped, allowing
  kubelet to act before post-stop hooks finish. Reorders operations so hooks
  execute before status update. Also prevents duplicate IRQ balance re-enabling
  via per-container tracking. PR #9613, related to OCPBUGS-63713.

repository:

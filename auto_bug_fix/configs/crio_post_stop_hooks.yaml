  workdir: "/tmp/bugfix-workdir"

branches:
  source: "origin/main"
  target: "origin/release-1.33"

fix:
  commit: "92c18a2e2673764cd10f89b1a5061e2b26f44209"

build:
  command: "go build ./..."
  test_command: "go test -count=1 -timeout=300s ./server/... ./internal/oci/... ./internal/runtimehandlerhooks/..."

model: "claude-sonnet-4-6"
